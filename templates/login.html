<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sentinel — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=IBM+Plex+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:#020408;color:#e2eaf4;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#0a1628;border:1px solid #152035;border-radius:16px;padding:44px 40px;width:100%;max-width:400px;text-align:center}
.orb{width:56px;height:56px;background:linear-gradient(135deg,rgba(0,212,255,.2),rgba(0,212,255,.05));border:1px solid #0098cc;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 20px}
h1{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px}
.sub{font-size:12px;color:#3d5c7a;font-family:'IBM Plex Mono',monospace;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
.err{background:rgba(255,59,59,.1);border:1px solid rgba(255,59,59,.3);color:#ff6b6b;border-radius:8px;padding:10px;font-size:13px;margin-bottom:16px}
input{width:100%;background:#050d1a;border:1px solid #1e3050;color:#e2eaf4;border-radius:8px;padding:12px 16px;font-size:14px;font-family:'Syne',sans-serif;outline:none;transition:border-color .2s}
input:focus{border-color:#00d4ff;box-shadow:0 0 0 3px rgba(0,212,255,.1)}
input::placeholder{color:#3d5c7a}
button{margin-top:14px;width:100%;background:linear-gradient(135deg,#00d4ff,#0090cc);border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:700;color:#020408;cursor:pointer;font-family:'Syne',sans-serif;transition:opacity .2s}
button:hover{opacity:.9}
</style>
</head>
<body>
<div class="card">
  <div class="orb">🛡️</div>
  <h1>GitHub Sentinel</h1>
  <div class="sub">Mass Secret Scanner</div>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="POST" action="/login">
    <input type="password" name="password" placeholder="Enter access password" autofocus required/>
    <button type="submit">Access Dashboard</button>
  </form>
</div>
</body>
</html>
